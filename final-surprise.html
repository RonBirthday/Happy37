<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בואו נתחיל! 🎉</title>
    <style>
        body {
            font-family: 'Assistant', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
            direction: rtl;
            overflow: hidden;
        }
        
        /* Floating emojis */
        .emoji {
            position: fixed;
            font-size: 3rem;
            animation: float 4s ease-in-out infinite;
            opacity: 0.7;
        }
        
        .emoji-1 {
            top: 10%;
            right: 15%;
            animation-delay: 0s;
        }
        
        .emoji-2 {
            top: 20%;
            left: 10%;
            animation-delay: 1s;
        }
        
        .emoji-3 {
            bottom: 20%;
            right: 20%;
            animation-delay: 2s;
        }
        
        .emoji-4 {
            bottom: 15%;
            left: 15%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            z-index: 10;
            position: relative;
        }
        
        .big-emoji {
            font-size: 8rem;
            margin-bottom: 2rem;
            animation: bounceIn 1.5s ease-out;
        }
        
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .message-box {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 1s ease-out 0.5s backwards;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .title {
            font-size: 4rem;
            color: #d63447;
            margin-bottom: 2rem;
            font-weight: bold;
            text-shadow: 0 3px 10px rgba(214, 52, 71, 0.3);
        }
        
        .message {
            font-size: 2.5rem;
            color: #2c2c2c;
            line-height: 1.8;
            font-weight: bold;
        }
        
        .fashion {
            color: #f093fb;
            font-size: 3rem;
            display: inline-block;
            animation: rainbow 3s ease-in-out infinite;
        }
        
        @keyframes rainbow {
            0%, 100% {
                color: #f093fb;
                transform: scale(1);
            }
            25% {
                color: #f5576c;
            }
            50% {
                color: #4facfe;
                transform: scale(1.1);
            }
            75% {
                color: #0fb8ad;
            }
        }
        
        .emoji-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            font-size: 3.5rem;
            margin-top: 2rem;
        }
        
        .emoji-row span {
            animation: jump 1s ease-in-out infinite;
        }
        
        .emoji-row span:nth-child(1) { animation-delay: 0s; }
        .emoji-row span:nth-child(2) { animation-delay: 0.2s; }
        .emoji-row span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes jump {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .big-emoji {
                font-size: 5rem;
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .message {
                font-size: 1.8rem;
            }
            
            .fashion {
                font-size: 2.2rem;
            }
            
            .message-box {
                padding: 2rem;
            }
            
            .emoji-row {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating emojis -->
    <div class="emoji emoji-1">👔</div>
    <div class="emoji emoji-2">👗</div>
    <div class="emoji emoji-3">👕</div>
    <div class="emoji emoji-4">🎽</div>
    
    <div class="container">
        <div class="big-emoji">🎉</div>
        
        <div class="message-box">
            <h1 class="title">יאלה!</h1>
            
            <p class="message">
                בוא ניצא ל-<br>
                <span class="fashion">Big Fashion</span>
            </p>
            
            <div class="emoji-row">
                <span>🛍️</span>
                <span>✨</span>
                <span>👔</span>
            </div>
        </div>
    </div>
</body>
</html>
