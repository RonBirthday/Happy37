<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתנה מס' 4 🎁</title>
    <style>
        body {
            font-family: 'Assistant', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
            direction: rtl;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            font-size: 3rem;
            color: #6a4c93;
            margin-bottom: 2rem;
        }
        
        .emoji-big {
            font-size: 5rem;
            margin: 2rem 0;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .message {
            font-size: 2rem;
            color: #2c2c2c;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">מתנה מס' 4</h1>
        <div class="emoji-big">🎁</div>
        <p class="message">
            המתנה הבאה ממתינה לך...<br>
            🎉 המשך נהדר! 🎉
        </p>
    </div>
</body>
</html>
