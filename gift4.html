<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתנה מס' 4 🎾</title>
    <link rel="stylesheet" href="gift4-style.css">
</head>
<body>
    <div class="container">
        <!-- Floating tennis emojis -->
        <div class="tennis tennis-1">🎾</div>
        <div class="tennis tennis-2">🏸</div>
        <div class="tennis tennis-3">🎾</div>
        <div class="tennis tennis-4">🏸</div>
        <div class="tennis tennis-5">🎾</div>
        <div class="tennis tennis-6">🏸</div>
        
        <!-- Stars -->
        <div class="star star-1">⭐</div>
        <div class="star star-2">✨</div>
        <div class="star star-3">⭐</div>
        <div class="star star-4">✨</div>
        
        <!-- Main content -->
        <div class="content">
            <div class="gift-badge">🎾</div>
            <h1 class="title">מתנה מס' 4</h1>
            
            <div class="gift-card">
                <p class="intro">
                    היה לך תחביב ישן.. של טניס. 🎾
                </p>
                
                <p class="main-message">
                    אז יאלה, תחזור לזה קצת!
                </p>
                
                <div class="surprise-box">
                    <p class="big-reveal">
                        📅 יום שישי, 15:30 📅
                    </p>
                    <p class="location">
                        📍 בית יהושוע 📍
                    </p>
                    <p class="details">
                        <span class="special">שיעור פרטי עם מאמן תותח<br>
                        שיחזיר לך קצת את<br>
                        החדווה ממשחק!</span>
                    </p>
                </div>
                
                <div class="emoji-row">
                    <span>🎾</span>
                    <span>💪</span>
                    <span>🏆</span>
                    <span>💪</span>
                    <span>🎾</span>
                </div>
            </div>
            
            <button class="ready-button" onclick="startDay()">
                מוכן להתחיל את היום? 🌟
            </button>
        </div>
    </div>

    <script>
        function startDay() {
            window.location.href = 'final-surprise.html';
        }
    </script>
</body>
</html>
