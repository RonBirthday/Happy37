<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Journey - Gifts Await!</title>
    <link rel="stylesheet" href="journey-style.css">
</head>
<body>
    <div class="container">
        <!-- Animated gift boxes -->
        <div class="gift gift-1">🎁</div>
        <div class="gift gift-2">🎁</div>

        <div class="gift gift-4">🎁</div>
        
        <!-- Sparkles -->
        <div class="sparkle sparkle-1">✨</div>
        <div class="sparkle sparkle-2">✨</div>
        <div class="sparkle sparkle-3">✨</div>
        <div class="sparkle sparkle-4">✨</div>
        <div class="sparkle sparkle-5">✨</div>
        <div class="sparkle sparkle-6">✨</div>
        
        <!-- Main content -->

            <h1 class="question">Are You Ready</h1>
            <h2 class="question2">to Get Your</h2>
            <h1 class="gifts-text">GIFTS?????</h1>

                <span class="emoji">🎊</span>

            <button class="yes-button" onclick="showGifts()">

    <script>
        function showGifts() {
            // This will navigate to the gifts page
            window.location.href = 'gifts.html';
        }
