<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טקס קבלת המתנות 🎁</title>
    <link rel="stylesheet" href="ceremony-style.css">
</head>
<body>
    <div class="container">
        <!-- Animated gift boxes floating -->
        <div class="gift-float gift-1">🎁</div>
        <div class="gift-float gift-2">🎁</div>
        <div class="gift-float gift-3">🎁</div>
        <div class="gift-float gift-4">🎁</div>
        <div class="gift-float gift-5">🎁</div>
        <div class="gift-float gift-6">🎁</div>
        
        <!-- Sparkles -->
        <div class="sparkle sparkle-1">✨</div>
        <div class="sparkle sparkle-2">💫</div>
        <div class="sparkle sparkle-3">⭐</div>
        <div class="sparkle sparkle-4">✨</div>
        <div class="sparkle sparkle-5">💫</div>
        <div class="sparkle sparkle-6">⭐</div>
        
        <!-- Main content -->
        <div class="content">
            <h1 class="title">🎊 טקס קבלת המתנות 🎊</h1>
            
            <div class="ceremony-card">
                <div class="drum-roll">
                    <p class="announcement">🥁 תופים בבקשה... 🥁</p>
                </div>
                
                <div class="gift-list">
                    <div class="gift-item">
                        <div class="gift-icon">🎁</div>
                        <h2>מתנה ראשונה</h2>
                        <p class="gift-description">בקרוב תתגלה...</p>
                    </div>
                    
                    <div class="gift-item">
                        <div class="gift-icon">🎁</div>
                        <h2>מתנה שנייה</h2>
                        <p class="gift-description">בקרוב תתגלה...</p>
                    </div>
                    
                    <div class="gift-item">
                        <div class="gift-icon">🎁</div>
                        <h2>מתנה שלישית</h2>
                        <p class="gift-description">בקרוב תתגלה...</p>
                    </div>
                </div>
                
                <div class="surprise-message">
                    <p>🎉 ההפתעות ממתינות לך! 🎉</p>
                </div>
            </div>
            
            <button class="reveal-button" onclick="revealGifts()">
                חשוף את המתנות! 🎁
            </button>
        </div>
    </div>

    <script>
        function revealGifts() {
            // Navigate to gifts reveal page
            window.location.href = 'gifts-reveal.html';
        }
    </script>
</body>
</html>
