<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתנה מס' 1 🎁</title>
    <link rel="stylesheet" href="gift1-style.css">
</head>
<body>
    <div class="container">
        <!-- Laughing emojis floating -->
        <div class="emoji emoji-1">😂</div>
        <div class="emoji emoji-2">🤣</div>
        <div class="emoji emoji-3">😆</div>
        <div class="emoji emoji-4">😂</div>
        <div class="emoji emoji-5">🤣</div>
        <div class="emoji emoji-6">😆</div>
        <div class="emoji emoji-7">😂</div>
        <div class="emoji emoji-8">🤣</div>
        <div class="emoji emoji-9">😆</div>
        <div class="emoji emoji-10">😂</div>
        
        <!-- Main content -->
        <div class="content">
            <div class="gift-badge">🎁</div>
            <h1 class="title">מתנה מס' 1</h1>
            
            <div class="gift-card">
                <div class="message-box">
                    <p class="main-message">
                        כמו שאתה כפית עלי אוזניות...<br>
                        אני כופה עליך לשדרג את ה....
                    </p>
                    
                    <div class="laugh-row">
                        <span>😂</span>
                        <span>🤣</span>
                        <span>😆</span>
                        <span>😂</span>
                        <span>🤣</span>
                    </div>
                    
                    <div class="suspense">
                        <p class="dots">...</p>
                    </div>
                </div>
            </div>
            
            <button class="reveal-button" onclick="revealGift()">
                חשוף את המתנה! 🎁
            </button>
        </div>
    </div>

    <script>
        function revealGift() {
            // Navigate to the actual gift reveal
            window.location.href = 'gift1-reveal.html';
        }
    </script>
</body>
</html>
