<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המתנה הראשונה! 🎁</title>
    <style>
        body {
            font-family: 'Assistant', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
            direction: rtl;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
        }
        
        .title {
            font-size: 3rem;
            color: white;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }
        
        .gift-box {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 2rem 0;
        }
        
        .gift-reveal {
            font-size: 2.5rem;
            color: #d63447;
            font-weight: bold;
            margin: 2rem 0;
        }
        
        .emoji-big {
            font-size: 5rem;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎁 המתנה הראשונה שלך! 🎁</h1>
        <div class="gift-box">
            <div class="emoji-big">🎁</div>
            <p class="gift-reveal">המתנה שלך ממתינה להתגלות...</p>
            <p>(הוסף כאן את פרטי המתנה האמיתית)</p>
        </div>
        
        <button class="next-button" onclick="nextGift()">
            מעבר למתנה מס' 2 🎁
        </button>
    </div>
    
    <script>
        function nextGift() {
            window.location.href = 'gift2.html';
        }
    </script>
    
    <style>
        .next-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 2rem;
            font-family: 'Assistant', 'Segoe UI', sans-serif;
        }
        
        .next-button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
    </style>
</body>
</html>
